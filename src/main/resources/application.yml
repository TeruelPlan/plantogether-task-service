server:
  port: 8085

spring:
  application:
    name: plantogether-task-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/plantogether_task
    username: ${DB_USER:plantogether}
    password: ${DB_PASSWORD:plantogether}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

grpc:
  trip-service:
    host: ${TRIP_SERVICE_GRPC_HOST:localhost}
    port: ${TRIP_SERVICE_GRPC_PORT:9081}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

task:
  reminder:
    cron: ${TASK_REMINDER_CRON:0 0 * * * *}
    window-hours: ${TASK_REMINDER_WINDOW_HOURS:24}
